name: travis234 release image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build into the image"
        required: false
        default: "main"
      image_tag:
        description: "GHCR image tag"
        required: false
        default: "production"
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/travis234

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
      TERM: xterm-256color
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync
      - name: Run Python tests
        run: PYTHONPATH=. uv run pytest -q -p no:cacheprovider tests
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test npm launcher
        run: npm --prefix packages/travis234-cli test
      - name: Verify npm package
        run: npm --prefix packages/travis234-cli run pack:dry-run

  image-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build no-cache smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          load: true
          push: false
          no-cache: true
          tags: travis234:hardening-smoke
      - name: Run installed image smoke
        run: python evals/container_smoke.py --image travis234:hardening-smoke

  build-and-push:
    needs: [test, image-smoke]
    runs-on: ubuntu-latest
    env:
      TRAVIS234_REF: ${{ inputs.ref || github.event.release.tag_name || github.ref_name }}
      IMAGE_TAG: ${{ inputs.image_tag || github.event.release.tag_name || 'production' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TRAVIS234_REF }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Travis234 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          no-cache: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:production
