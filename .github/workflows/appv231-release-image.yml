name: appv231 release image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build into the image"
        required: false
        default: "next/appv23.1"
      image_tag:
        description: "GHCR image tag"
        required: false
        default: "production"
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/appv231
      APPV231_REF: ${{ inputs.ref || github.event.release.tag_name || github.ref_name }}
      IMAGE_TAG: ${{ inputs.image_tag || github.event.release.tag_name || 'production' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.APPV231_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push appv231 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.appv231.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:production
